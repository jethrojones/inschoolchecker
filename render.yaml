services:
  - type: web
    name: inschoolchecker-api
    runtime: python
    plan: free
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inschoolchecker-db
          property: connectionString
      - key: USER_AGENT_STRING
        value: DistrictStatusChecker/0.1 (+contact: ops@example.com)
      - key: CORS_ALLOWED_ORIGINS
        value: https://jethrojones.github.io
      - key: SNAPSHOT_DIR
        value: /tmp/inschoolchecker-snapshots
      - key: PYTHON_VERSION
        value: 3.11.11

databases:
  - name: inschoolchecker-db
    plan: free

